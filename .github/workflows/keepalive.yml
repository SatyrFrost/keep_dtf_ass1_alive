name: Supabase Frontend Keepalive

on:
  schedule:
    # Run every 3 days at 03:17 UTC
    - cron: "17 3 */3 * *"

  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Run keepalive upload
        run: npm run keepalive
